    <rect class="head" width="240" height="32" rx="8"/>
    <text class="title" x="12" y="21">RECHARGE</text>
    <text class="key" x="12" y="54">PK</text><text class="col" x="44" y="54">rechargeId</text>
    <text class="fk" x="12" y="74">FK</text><text class="col" x="44" y="74">phoneNumber</text>
    <text class="col" x="44" y="94">amount</text>
    <text class="col" x="44" y="114">rechargeDate</text>
  </g>
  <g transform="translate(30 500)">
