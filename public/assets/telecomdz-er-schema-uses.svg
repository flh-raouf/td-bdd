    <rect class="head" width="240" height="32" rx="8"/>
    <text class="title" x="12" y="21">PLAN</text>
    <text class="key" x="12" y="54">PK</text><text class="col" x="44" y="54">planId</text>
    <text class="col" x="44" y="74">planName</text>
    <text class="col" x="44" y="94">monthlyRate</text>
  </g>
  <g transform="translate(720 330)">
    <rect class="table" width="240" height="96" rx="8"/>
    <rect class="head" width="240" height="32" rx="8"/>
    <text class="title" x="12" y="21">FEATURE</text>
    <text class="key" x="12" y="54">PK</text><text class="col" x="44" y="54">featureId</text>
    <text class="fk" x="12" y="74">FK</text><text class="col" x="44" y="74">planId</text>
    <text class="col" x="44" y="94">featureName</text>
  </g>
  <g transform="translate(720 500)">
    <rect class="table" width="240" height="116" rx="8"/>
    <rect class="head" width="240" height="32" rx="8"/>
    <text class="title" x="12" y="21">SIGNUP</text>
    <text class="key" x="12" y="54">PK/FK</text><text class="col" x="62" y="54">phoneNumber</text>
    <text class="key" x="12" y="74">PK/FK</text><text class="col" x="62" y="74">planId</text>
    <text class="key" x="12" y="94">PK</text><text class="col" x="44" y="94">startDate</text>
    <text class="col" x="44" y="114">endDate</text>
  </g>
